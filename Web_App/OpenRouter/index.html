<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenRouter Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --bg2: #17171a;
    --bg3: #1e1e22;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e8ec;
    --text2: #9090a0;
    --text3: #5a5a6a;
    --accent: #7c6af7;
    --accent2: #9d8fff;
    --accent-bg: rgba(124,106,247,0.12);
    --green: #3ecf8e;
    --red: #f76c6c;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .logo {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent2); }

  header .spacer { flex: 1; }

  /* custom model dropdown */
  .model-dropdown {
    position: relative;
  }
  .model-dropdown-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    padding: 6px 10px;
    cursor: pointer;
    min-width: 180px;
    max-width: 240px;
    font-family: inherit;
    transition: border-color 0.15s;
    white-space: nowrap;
    overflow: hidden;
  }
  .model-dropdown-btn:hover { border-color: rgba(124,106,247,0.4); }
  .model-dropdown-btn.open { border-color: var(--accent); }
  .model-dropdown-btn .btn-label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: left;
  }
  .model-dropdown-btn .chevron {
    flex-shrink: 0;
    transition: transform 0.2s;
    color: var(--text3);
    font-size: 10px;
  }
  .model-dropdown-btn.open .chevron { transform: rotate(180deg); }

  .model-dropdown-list {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    z-index: 300;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    min-width: 320px;
    max-height: 420px;
    overflow-y: auto;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .model-dropdown-list::-webkit-scrollbar { width: 4px; }
  .model-dropdown-list::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }
  .model-dropdown-list.open { display: block; }

  .dropdown-search {
    padding: 10px 12px 8px;
    border-bottom: 0.5px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg2);
    z-index: 1;
  }
  .dropdown-search input {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    font-family: inherit;
  }
  .dropdown-search input:focus { border-color: var(--accent); }

  .dropdown-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    cursor: pointer;
    transition: background 0.1s;
    gap: 10px;
  }
  .dropdown-item:hover { background: rgba(255,255,255,0.04); }
  .dropdown-item.selected { background: var(--accent-bg); }
  .dropdown-item .item-name {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dropdown-item .item-perf {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }
  .dropdown-item .item-stat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 1px;
  }
  .dropdown-item .stat-val {
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    line-height: 1;
  }
  .dropdown-item .stat-label {
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .dropdown-item .stat-sep {
    width: 0.5px;
    height: 22px;
    background: var(--border);
    flex-shrink: 0;
    margin: 0 2px;
  }
  .dropdown-loading {
    padding: 16px;
    text-align: center;
    font-size: 12px;
    color: var(--text3);
  }

  .model-status {
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
  }
  .model-status.ok { color: var(--green); }
  .model-status.loading { color: var(--accent2); }

  .perf-badges {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .perf-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
  }
  .perf-badge .badge-label {
    color: var(--text3);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .perf-badge .badge-val {
    font-weight: 500;
    color: var(--text);
  }
  .perf-badge.loading-badge {
    color: var(--text3);
    font-style: italic;
  }

  .unit-btn {
    background: transparent;
    border: none;
    color: var(--text3);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.1s, color 0.1s;
  }
  .unit-btn:hover { background: var(--bg3); color: var(--text); }
  .unit-btn.active { background: var(--accent); color: #fff; }

  /* settings button */
  #settings-btn {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }
  #settings-btn:hover { border-color: var(--border2); color: var(--text); }

  /* new chat button */
  #new-chat-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  #new-chat-btn:hover { border-color: var(--border2); color: var(--text); }

  /* ── settings panel ── */
  #settings-panel {
    display: none;
    position: absolute;
    top: 58px;
    right: 20px;
    z-index: 100;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 16px;
    width: 320px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  #settings-panel.open { display: block; }

  .settings-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 12px;
  }

  .field-label {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    display: block;
  }

  .field-group { margin-bottom: 14px; }

  .key-input-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"], input[type="password"] {
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    padding: 8px 10px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--accent);
  }

  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
    font-family: inherit;
  }
  .btn-save:hover { opacity: 0.9; }

  .api-hint {
    font-size: 11px;
    color: var(--text3);
    margin-top: 6px;
    line-height: 1.5;
  }
  .api-hint a { color: var(--accent2); text-decoration: none; }
  .api-hint a:hover { text-decoration: underline; }

  .sys-textarea {
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    padding: 8px 10px;
    width: 100%;
    min-height: 70px;
    resize: vertical;
    outline: none;
    font-family: inherit;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  .sys-textarea:focus { border-color: var(--accent); }

  /* ── messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

  .msg-row {
    display: flex;
    padding: 10px 24px;
    gap: 14px;
    transition: background 0.1s;
  }
  .msg-row:hover { background: rgba(255,255,255,0.015); }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .avatar.ai {
    background: var(--accent-bg);
    color: var(--accent2);
    border: 0.5px solid rgba(124,106,247,0.25);
  }
  .avatar.user {
    background: rgba(62,207,142,0.12);
    color: var(--green);
    border: 0.5px solid rgba(62,207,142,0.2);
  }

  .msg-bubble {
    max-width: min(72%, 640px);
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
  }

  .msg-row.user .msg-bubble {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 12px 4px 12px 12px;
    padding: 10px 14px;
    color: var(--text);
  }

  .msg-row.ai .msg-bubble {
    color: var(--text);
    padding: 4px 0;
  }

  /* markdown-ish */
  .msg-bubble pre {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0;
    overflow: hidden;
    font-size: 13px;
    margin: 8px 0;
    font-family: "SF Mono", "Fira Code", monospace;
    line-height: 1.6;
    position: relative;
  }
  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    background: rgba(255,255,255,0.04);
    border-bottom: 0.5px solid var(--border);
  }
  .code-lang {
    font-size: 11px;
    color: var(--text3);
    font-family: "SF Mono", "Fira Code", monospace;
    text-transform: lowercase;
  }
  .copy-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 4px;
    color: var(--text3);
    font-size: 11px;
    padding: 2px 8px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s, color 0.15s;
    line-height: 1.6;
  }
  .copy-btn:hover { border-color: var(--border2); color: var(--text2); }
  .copy-btn.copied { color: var(--green); border-color: rgba(62,207,142,0.3); }
  .msg-bubble pre code {
    display: block;
    padding: 12px 14px;
    overflow-x: auto;
  }
  /* highlight.js テーマ上書き（背景透過） */
  .hljs { background: transparent !important; padding: 0 !important; }

  /* シンタックスカラー（ダーク） */
  .hljs-keyword  { color: #c792ea; }
  .hljs-string   { color: #c3e88d; }
  .hljs-comment  { color: #546e7a; font-style: italic; }
  .hljs-number   { color: #f78c6c; }
  .hljs-built_in { color: #82aaff; }
  .hljs-title    { color: #82aaff; }
  .hljs-attr     { color: #ffcb6b; }
  .hljs-literal  { color: #ff5370; }
  .hljs-type     { color: #ffcb6b; }
  .hljs-variable { color: #eeffff; }
  .hljs-params   { color: #eeffff; }
  .hljs-tag      { color: #f07178; }
  .hljs-name     { color: #f07178; }
  .msg-bubble code {
    background: var(--bg3);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 12.5px;
    font-family: "SF Mono", "Fira Code", monospace;
    color: var(--accent2);
  }
  .msg-bubble pre code {
    background: none;
    padding: 0;
    color: var(--text);
  }
  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble ul, .msg-bubble ol {
    padding-left: 20px;
    margin-bottom: 8px;
  }
  .msg-bubble li { margin-bottom: 3px; }
  .msg-bubble strong { font-weight: 600; color: var(--text); }
  .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
    font-weight: 600;
    margin: 12px 0 6px;
    color: var(--text);
  }
  .msg-bubble h1 { font-size: 18px; }
  .msg-bubble h2 { font-size: 16px; }
  .msg-bubble h3 { font-size: 14px; }

  /* typing indicator */
  .typing-dot {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }
  .typing-dot span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text3);
    animation: bounce 1.2s infinite;
  }
  .typing-dot span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* empty state */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text3);
    font-size: 14px;
    user-select: none;
    padding: 40px 20px;
    text-align: center;
  }
  #empty-state .big { font-size: 28px; margin-bottom: 4px; }
  #empty-state .name {
    font-size: 17px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 4px;
  }
  #empty-state .no-key {
    background: rgba(247,108,108,0.1);
    border: 0.5px solid rgba(247,108,108,0.25);
    border-radius: var(--radius-sm);
    color: var(--red);
    font-size: 12px;
    padding: 6px 12px;
    margin-top: 8px;
  }

  /* ── input area ── */
  #input-area {
    padding: 14px 20px 20px;
    border-top: 0.5px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 14px;
    padding: 10px 12px;
    transition: border-color 0.15s;
  }
  .input-box:focus-within { border-color: rgba(124,106,247,0.4); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    line-height: 1.6;
    resize: none;
    max-height: 160px;
    min-height: 22px;
    overflow-y: auto;
  }
  #user-input::placeholder { color: var(--text3); }
  #user-input::-webkit-scrollbar { width: 3px; }
  #user-input::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  #send-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
    color: #fff;
  }
  #send-btn:hover { opacity: 0.9; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  #send-btn svg { width: 16px; height: 16px; }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding: 0 2px;
  }
  .input-hint { font-size: 11px; color: var(--text3); }
  #stop-btn {
    display: none;
    background: rgba(247,108,108,0.1);
    border: 0.5px solid rgba(247,108,108,0.25);
    border-radius: var(--radius-sm);
    color: var(--red);
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: inherit;
  }
  #stop-btn.visible { display: inline-block; }

  /* error toast */
  #error-toast {
    display: none;
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(247,108,108,0.15);
    border: 0.5px solid rgba(247,108,108,0.3);
    border-radius: var(--radius-sm);
    color: var(--red);
    font-size: 13px;
    padding: 8px 16px;
    z-index: 200;
    max-width: 400px;
    text-align: center;
  }
  #error-toast.show { display: block; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<header>
  <div class="logo">Open<span>Router</span> Chat</div>
  <div class="spacer"></div>
  <div class="model-status" id="model-status">モデル未選択</div>
  <div class="perf-badges" id="perf-badges" style="display:none;">
    <div class="perf-badge loading-badge" id="perf-loading">取得中…</div>
  </div>
  <div class="model-dropdown" id="model-dropdown">
    <button class="model-dropdown-btn" id="model-dropdown-btn">
      <span class="btn-label" id="model-btn-label">── モデルを選択 ──</span>
      <span class="chevron">▼</span>
    </button>
    <div class="model-dropdown-list" id="model-dropdown-list">
      <div class="dropdown-search">
        <input type="text" id="model-search" placeholder="モデルを検索…" autocomplete="off">
      </div>
      <div id="model-dropdown-items">
        <div class="dropdown-loading">読み込み中…</div>
      </div>
    </div>
  </div>
  <button id="new-chat-btn" title="会話をリセット">新しい会話</button>
  <button id="settings-btn" title="設定">⚙</button>
</header>

<!-- settings panel -->
<div id="settings-panel">
  <div class="settings-title">設定</div>

  <div class="field-group">
    <label class="field-label" for="api-key-input">OpenRouter APIキー</label>
    <div class="key-input-row">
      <input type="text" id="api-key-input" placeholder="sk-or-v1-..." autocomplete="off" style="font-family:monospace;font-size:12px;">
      <button class="btn-save" id="save-key-btn">保存</button>
    </div>
    <p class="api-hint">
      APIキーは <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a> から取得できます。<br>
      このキーはブラウザのローカルストレージのみに保存されます。
    </p>
  </div>

  <div class="field-group">
    <label class="field-label">レイテンシー表示単位</label>
    <div style="display:flex;gap:0;border:0.5px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;width:fit-content;">
      <button id="unit-ms" class="unit-btn" onclick="setLatencyUnit('ms')">ms</button>
      <button id="unit-s"  class="unit-btn" onclick="setLatencyUnit('s')">s</button>
    </div>
  </div>

  <div class="field-group">
    <label class="field-label" for="sys-prompt-input">システムプロンプト（任意）</label>
    <textarea class="sys-textarea" id="sys-prompt-input" placeholder="例: You are a helpful assistant. Answer in Japanese."></textarea>
  </div>

  <button class="btn-save" id="save-settings-btn" style="width:100%;margin-top:4px;">設定を保存</button>
</div>

<!-- messages -->
<div id="messages">
  <div id="empty-state">
    <div class="big">✦</div>
    <div class="name">OpenRouter Chat</div>
    <div>モデルを選択してメッセージを送信してください</div>
    <div id="no-key-notice" class="no-key" style="display:none;">⚠ APIキーが設定されていません — 右上の ⚙ から設定してください</div>
  </div>
</div>

<div id="input-area">
  <div class="input-box">
    <textarea id="user-input" placeholder="メッセージを入力..." rows="1"></textarea>
    <button id="send-btn" title="送信" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="input-footer">
    <span class="input-hint">Shift+Enter で改行 · Enter で送信</span>
    <button id="stop-btn">■ 停止</button>
  </div>
</div>

<div id="error-toast"></div>

<script>
const $ = id => document.getElementById(id);

/* ─────── state ─────── */
let apiKey = localStorage.getItem('or_api_key') || '';
let systemPrompt = localStorage.getItem('or_sys_prompt') || '';
let messages = [];           // {role, content}
let isStreaming = false;
let abortController = null;
let currentModel = localStorage.getItem('or_model') || '';
let latencyUnit = localStorage.getItem('or_latency_unit') || 'ms';

/* ─────── init ─────── */
$('api-key-input').value = apiKey;
$('sys-prompt-input').value = systemPrompt;
if (!apiKey) $('no-key-notice').style.display = 'block';

loadModels();
updateUnitBtns();

/* ─────── settings panel ─────── */
$('settings-btn').onclick = e => {
  e.stopPropagation();
  // 開くたびに最新のlocalStorageから再反映
  const stored = localStorage.getItem('or_api_key') || '';
  if (stored) { apiKey = stored; $('api-key-input').value = stored; }
  $('settings-panel').classList.toggle('open');
};
document.addEventListener('click', e => {
  if (!$('settings-panel').contains(e.target) && e.target !== $('settings-btn')) {
    $('settings-panel').classList.remove('open');
  }
});

function saveSettings() {
  apiKey = $('api-key-input').value.trim();
  systemPrompt = $('sys-prompt-input').value.trim();
  localStorage.setItem('or_api_key', apiKey);
  localStorage.setItem('or_sys_prompt', systemPrompt);
  $('no-key-notice').style.display = apiKey ? 'none' : 'block';
  updateSendBtn();
}

function fmtTTFT(ms) {
  if (ms === null) return '—';
  if (latencyUnit === 's') return (ms / 1000).toFixed(1) + ' s';
  return Math.round(ms) + ' ms';
}

function setLatencyUnit(unit) {
  latencyUnit = unit;
  localStorage.setItem('or_latency_unit', unit);
  updateUnitBtns();
  // ドロップダウン内の全TTFT要素を再描画
  freeModels.forEach(m => {
    const key = m.id.replace(/[^a-z0-9]/gi,'_');
    const el = document.getElementById('dd-ttft-' + key);
    if (el) el.textContent = fmtTTFT(m.ttft);
  });
  // ヘッダーバッジも更新
  const badgeEl = $('perf-badges').querySelector('.badge-val');
  if (badgeEl && currentModel) {
    const m = freeModels.find(m => m.id === currentModel);
    if (m) {
      const ttftBadge = $('perf-badges').querySelector('[data-type="ttft"]');
      if (ttftBadge) ttftBadge.textContent = fmtTTFT(m.ttft);
    }
  }
}

function updateUnitBtns() {
  $('unit-ms').classList.toggle('active', latencyUnit === 'ms');
  $('unit-s').classList.toggle('active', latencyUnit === 's');
}

$('api-key-input').addEventListener('input', () => {
  apiKey = $('api-key-input').value.trim();
  localStorage.setItem('or_api_key', apiKey);
  $('no-key-notice').style.display = apiKey ? 'none' : 'block';
  updateSendBtn();
});

$('save-key-btn').onclick = () => {
  saveSettings();
  showToast('APIキーを保存しました', false);
  $('settings-panel').classList.remove('open');
  if (apiKey) loadModels();
};

$('save-settings-btn').onclick = () => {
  saveSettings();
  showToast('設定を保存しました', false);
  $('settings-panel').classList.remove('open');
  if (apiKey) loadModels();
};

/* ─────── load free models ─────── */
let freeModels = [];   // {id, name, ttft, tps}  (perf filled in lazily)

async function loadModels() {
  const status = $('model-status');
  const items = $('model-dropdown-items');
  status.className = 'model-status loading';
  status.textContent = '読み込み中…';
  items.innerHTML = '<div class="dropdown-loading">読み込み中…</div>';

  try {
    const res = await fetch('https://openrouter.ai/api/v1/models', {
      headers: apiKey ? { 'Authorization': 'Bearer ' + apiKey } : {}
    });
    const data = await res.json();

    freeModels = (data.data || [])
      .filter(m => {
        const p = m.pricing;
        return p && parseFloat(p.prompt) === 0 && parseFloat(p.completion) === 0;
      })
      .sort((a, b) => (a.name || a.id).localeCompare(b.name || b.id))
      .map(m => ({ id: m.id, name: m.name || m.id, ttft: null, tps: null }));

    if (freeModels.length === 0) {
      items.innerHTML = '<div class="dropdown-loading">無料モデルが見つかりません</div>';
      status.textContent = '無料モデルなし';
      status.className = 'model-status';
      return;
    }

    renderDropdownItems(freeModels, '');

    if (currentModel && freeModels.find(m => m.id === currentModel)) {
      const m = freeModels.find(m => m.id === currentModel);
      $('model-btn-label').textContent = m.name;
      status.textContent = '✓ ' + m.name;
      status.className = 'model-status ok';
      fetchModelPerf(currentModel, true);
    } else {
      status.textContent = freeModels.length + ' 件の無料モデル';
      status.className = 'model-status';
    }

    updateSendBtn();

    // バックグラウンドで全モデルのperf取得
    fetchAllPerf();

  } catch (err) {
    items.innerHTML = '<div class="dropdown-loading">読み込み失敗</div>';
    status.textContent = 'エラー';
    status.className = 'model-status';
  }
}

function renderDropdownItems(models, query) {
  const items = $('model-dropdown-items');
  const q = query.toLowerCase();
  const filtered = q ? models.filter(m => m.name.toLowerCase().includes(q) || m.id.toLowerCase().includes(q)) : models;

  if (filtered.length === 0) {
    items.innerHTML = '<div class="dropdown-loading">一致するモデルなし</div>';
    return;
  }

  items.innerHTML = filtered.map(m => {
    const ttftStr = fmtTTFT(m.ttft);
    const tpsStr  = m.tps  !== null ? m.tps.toFixed(1)  : '—';
    const sel = m.id === currentModel ? ' selected' : '';
    return `<div class="dropdown-item${sel}" data-id="${m.id}">
      <span class="item-name">${m.name}</span>
      <div class="item-perf">
        <div class="item-stat">
          <span class="stat-val" id="dd-ttft-${m.id.replace(/[^a-z0-9]/gi,'_')}">${ttftStr}</span>
          <span class="stat-label">TTFT</span>
        </div>
        <div class="stat-sep"></div>
        <div class="item-stat">
          <span class="stat-val" id="dd-tps-${m.id.replace(/[^a-z0-9]/gi,'_')}">${tpsStr}</span>
          <span class="stat-label">TPS</span>
        </div>
      </div>
    </div>`;
  }).join('');

  items.querySelectorAll('.dropdown-item').forEach(el => {
    el.addEventListener('click', () => {
      currentModel = el.dataset.id;
      localStorage.setItem('or_model', currentModel);
      const m = freeModels.find(m => m.id === currentModel);
      $('model-btn-label').textContent = m ? m.name : currentModel;
      $('model-status').textContent = '✓ ' + (m ? m.name : currentModel);
      $('model-status').className = 'model-status ok';
      closeDropdown();
      updateSendBtn();
      fetchModelPerf(currentModel, true);
      renderDropdownItems(freeModels, $('model-search').value);
    });
  });
}

/* ドロップダウン開閉 */
$('model-dropdown-btn').addEventListener('click', e => {
  e.stopPropagation();
  const list = $('model-dropdown-list');
  const btn  = $('model-dropdown-btn');
  const isOpen = list.classList.contains('open');
  if (isOpen) { closeDropdown(); } else {
    list.classList.add('open');
    btn.classList.add('open');
    $('model-search').focus();
  }
});

document.addEventListener('click', e => {
  if (!$('model-dropdown').contains(e.target)) closeDropdown();
});

function closeDropdown() {
  $('model-dropdown-list').classList.remove('open');
  $('model-dropdown-btn').classList.remove('open');
}

$('model-search').addEventListener('input', () => {
  renderDropdownItems(freeModels, $('model-search').value);
});

/* ─────── perf fetch ─────── */
async function fetchModelPerf(modelId, updateHeader) {
  try {
    const parts = modelId.replace(/:free$/, '').split('/');
    const author = parts[0];
    const slug = parts.slice(1).join('/');
    const res = await fetch(`https://openrouter.ai/api/v1/models/${author}/${slug}/endpoints`, {
      headers: apiKey ? { 'Authorization': 'Bearer ' + apiKey } : {}
    });
    if (!res.ok) return;
    const data = await res.json();
    const endpoints = data?.data?.endpoints || [];
    if (!endpoints.length) return;

    let latSum = 0, tpsSum = 0, latCount = 0, tpsCount = 0;
    for (const ep of endpoints) {
      if (ep.latency_last_30m?.p50 != null)    { latSum += ep.latency_last_30m.p50;    latCount++; }
      if (ep.throughput_last_30m?.p50 != null) { tpsSum += ep.throughput_last_30m.p50; tpsCount++; }
    }
    const ttft = latCount ? latSum / latCount : null;
    const tps  = tpsCount ? tpsSum / tpsCount : null;

    // freeModels に保存
    const m = freeModels.find(m => m.id === modelId);
    if (m) { m.ttft = ttft; m.tps = tps; }

    // ドロップダウン内の該当行を更新
    const key = modelId.replace(/[^a-z0-9]/gi,'_');
    const ttftEl = document.getElementById('dd-ttft-' + key);
    const tpsEl  = document.getElementById('dd-tps-'  + key);
    if (ttftEl) ttftEl.textContent = fmtTTFT(ttft);
    if (tpsEl)  tpsEl.textContent  = tps  !== null ? tps.toFixed(1)         : '—';

    // ヘッダーバッジ更新
    if (updateHeader) {
      const badges = $('perf-badges');
      badges.style.display = 'flex';
      badges.innerHTML = '';
      if (ttft !== null) badges.innerHTML += `<div class="perf-badge"><span class="badge-label">TTFT</span><span class="badge-val" data-type="ttft">${fmtTTFT(ttft)}</span></div>`;
      if (tps  !== null) badges.innerHTML += `<div class="perf-badge"><span class="badge-label">TPS</span><span class="badge-val">${tps.toFixed(1)}</span></div>`;
      if (!badges.innerHTML) badges.style.display = 'none';
    }
  } catch {}
}

async function fetchAllPerf() {
  // 並列でまとめて取得（最大8並列）
  const BATCH = 8;
  for (let i = 0; i < freeModels.length; i += BATCH) {
    const batch = freeModels.slice(i, i + BATCH);
    await Promise.all(batch.map(m => fetchModelPerf(m.id, false)));
  }
}

function updateSendBtn() {
  const canSend = apiKey && currentModel && !isStreaming;
  $('send-btn').disabled = !canSend;
}

/* ─────── new chat ─────── */
$('new-chat-btn').onclick = () => {
  messages = [];
  const container = $('messages');
  container.innerHTML = `
    <div id="empty-state">
      <div class="big">✦</div>
      <div class="name">OpenRouter Chat</div>
      <div>モデルを選択してメッセージを送信してください</div>
      <div id="no-key-notice" class="no-key" style="display:${apiKey ? 'none' : 'block'};">⚠ APIキーが設定されていません — 右上の ⚙ から設定してください</div>
    </div>`;
};

/* ─────── textarea auto-resize ─────── */
const textarea = $('user-input');
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
});

textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!$('send-btn').disabled) sendMessage();
  }
});

$('send-btn').onclick = sendMessage;

/* ─────── stop ─────── */
$('stop-btn').onclick = () => {
  if (abortController) abortController.abort();
};

/* ─────── send ─────── */
async function sendMessage() {
  const text = textarea.value.trim();
  if (!text || isStreaming) return;

  hideEmptyState();

  messages.push({ role: 'user', content: text });
  appendMessage('user', text);

  textarea.value = '';
  textarea.style.height = 'auto';

  const aiRow = appendMessage('ai', '', true);
  const bubble = aiRow.querySelector('.msg-bubble');

  isStreaming = true;
  updateSendBtn();
  $('stop-btn').classList.add('visible');
  abortController = new AbortController();

  const payload = {
    model: currentModel,
    stream: true,
    messages: [
      ...(systemPrompt ? [{ role: 'system', content: systemPrompt }] : []),
      ...messages
    ]
  };

  let fullText = '';

  if (!apiKey) {
    bubble.innerHTML = '<span style="color:var(--red);">APIキーが設定されていません。⚙ から設定してください。</span>';
    isStreaming = false;
    updateSendBtn();
    $('stop-btn').classList.remove('visible');
    return;
  }

  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + apiKey,
        'Content-Type': 'application/json',
        'HTTP-Referer': location.href,
        'X-Title': 'OpenRouter Chat'
      },
      body: JSON.stringify(payload),
      signal: abortController.signal
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error((err.error?.message) || `HTTP ${res.status}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    bubble.innerHTML = '<div class="typing-dot"><span></span><span></span><span></span></div>';

    let buf = '';
    let started = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const chunk = line.slice(6).trim();
        if (chunk === '[DONE]') break;
        try {
          const obj = JSON.parse(chunk);
          const delta = obj.choices?.[0]?.delta?.content;
          if (delta) {
            if (!started) { bubble.innerHTML = ''; started = true; }
            fullText += delta;
            bubble.innerHTML = renderMarkdown(fullText);
            highlightAll(bubble);
            scrollBottom();
          }
        } catch {}
      }
    }

    messages.push({ role: 'assistant', content: fullText });

  } catch (err) {
    if (err.name === 'AbortError') {
      if (fullText) {
        bubble.innerHTML = renderMarkdown(fullText) + '<br><span style="color:var(--text3);font-size:12px;">— 停止しました</span>';
        highlightAll(bubble);
        messages.push({ role: 'assistant', content: fullText });
      } else {
        aiRow.remove();
        messages.pop();
      }
    } else {
      bubble.innerHTML = `<span style="color:var(--red);">エラー: ${escHtml(err.message)}</span>`;
      messages.pop();
      showToast('エラー: ' + err.message, true);
    }
  } finally {
    isStreaming = false;
    abortController = null;
    updateSendBtn();
    $('stop-btn').classList.remove('visible');
    scrollBottom();
  }
}

/* ─────── DOM helpers ─────── */
function hideEmptyState() {
  const es = $('empty-state');
  if (es) es.remove();
}

function appendMessage(role, text, streaming = false) {
  const container = $('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + role;
  avatar.textContent = role === 'user' ? 'You' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (streaming) {
    bubble.innerHTML = '<div class="typing-dot"><span></span><span></span><span></span></div>';
  } else {
    if (role === 'user') {
      bubble.textContent = text;
    } else {
      bubble.innerHTML = renderMarkdown(text);
    }
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  container.appendChild(row);
  scrollBottom(true);
  return row;
}

function isAtBottom() {
  const c = $('messages');
  return c.scrollHeight - c.scrollTop - c.clientHeight < 60;
}

function scrollBottom(force = false) {
  const c = $('messages');
  if (force || isAtBottom()) c.scrollTop = c.scrollHeight;
}

/* ─────── minimal markdown renderer ─────── */
function renderMarkdown(text) {
  let h = escHtml(text);
  // code blocks
  h = h.replace(/```([\w]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const id = 'cb' + Math.random().toString(36).slice(2,8);
    const langLabel = lang || 'code';
    return `<pre><div class="code-header"><span class="code-lang">${langLabel}</span><button class="copy-btn" onclick="copyCode('${id}')">コピー</button></div><code id="${id}" class="language-${lang || 'plaintext'}">${code.trim()}</code></pre>`;
  });
  // inline code
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  // headings
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // bold
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // italic
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // unordered list
  h = h.replace(/^[-•] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // ordered list
  h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // line breaks → paragraphs
  const blocks = h.split(/\n{2,}/);
  h = blocks.map(b => {
    if (/^<(h[123]|ul|ol|pre|li)/.test(b.trim())) return b;
    const lines = b.split('\n').join('<br>');
    return `<p>${lines}</p>`;
  }).join('');
  return h;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.closest('pre').querySelector('.copy-btn');
    if (btn) {
      btn.textContent = 'コピー済み';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
    }
  });
}

function highlightAll(container) {
  if (typeof hljs === 'undefined') return;
  container.querySelectorAll('pre code').forEach(el => {
    if (!el.dataset.highlighted) hljs.highlightElement(el);
  });
}

/* ─────── error toast ─────── */
let toastTimer;
function showToast(msg, isError = true) {
  const t = $('error-toast');
  t.textContent = msg;
  t.style.background = isError
    ? 'rgba(247,108,108,0.15)'
    : 'rgba(62,207,142,0.15)';
  t.style.borderColor = isError
    ? 'rgba(247,108,108,0.3)'
    : 'rgba(62,207,142,0.3)';
  t.style.color = isError ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

updateSendBtn();
</script>
</body>
</html>
